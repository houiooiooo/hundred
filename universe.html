<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十一宇宙 — Eleven Universe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--paper:#f5f2ed;--ink:#1a1a1a;--text:#2a2a2a;--grey:#7a756f;--light-grey:#d4d0cb;--dark:#0d0d0d;--dark-surface:#161616;--dark-border:#2a2a2a;}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--text);font-family:'Noto Serif TC',serif;font-weight:400;line-height:1.9;overflow-x:hidden;}
::selection{background:var(--ink);color:var(--paper)}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;}
.back{position:fixed;top:1.5rem;left:3rem;z-index:100;font-family:'Cormorant Garamond',serif;font-size:.85rem;letter-spacing:.15em;text-transform:uppercase;color:var(--grey);text-decoration:none;transition:color .3s;}
.back:hover{color:var(--ink)}
.page{max-width:900px;margin:0 auto;padding:8rem 3rem 10rem;}

/* Header */
.page-header{margin-bottom:6rem;opacity:0;animation:fadeUp .8s ease forwards .2s;}
.page-title{font-size:clamp(2.5rem,5vw,4rem);font-weight:300;letter-spacing:.2em;color:var(--ink);margin-bottom:.5rem;}
.page-title-en{font-family:'Cormorant Garamond',serif;font-size:clamp(.85rem,1.2vw,1rem);letter-spacing:.25em;color:var(--grey);text-transform:uppercase;display:block;margin-bottom:2rem;}
.page-intro{font-size:.95rem;font-weight:400;line-height:2.1;margin-bottom:1.5rem;max-width:620px;}
.page-intro-en{font-family:'Cormorant Garamond',serif;font-size:.9rem;color:var(--grey);line-height:1.9;max-width:620px;}

/* Sections */
.section{margin-bottom:6rem;opacity:0;transform:translateY(20px);transition:opacity .8s ease,transform .8s ease;}
.section.visible{opacity:1;transform:translateY(0);}
.section-label{font-family:'Cormorant Garamond',serif;font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:var(--grey);margin-bottom:1rem;display:block;}
.section-title{font-size:1.6rem;font-weight:300;letter-spacing:.15em;color:var(--ink);padding-bottom:1rem;border-bottom:1px solid var(--ink);margin-bottom:2rem;}

/* Poet gods UI */
.gods-list{display:flex;flex-direction:column;gap:0;}
.god-item{border-bottom:1px solid rgba(26,26,26,0.08);}
.god-header{display:flex;justify-content:space-between;align-items:baseline;padding:1.1rem 0;cursor:pointer;user-select:none;transition:opacity .3s;gap:1rem;}
.god-header:hover{opacity:.55}
.god-meta{display:flex;align-items:baseline;gap:1.2rem;flex:1;}
.god-num{font-family:'Cormorant Garamond',serif;font-size:.75rem;color:var(--light-grey);flex-shrink:0;}
.god-name{font-size:.95rem;font-weight:400;color:var(--ink);}
.god-vibe{font-family:'Cormorant Garamond',serif;font-size:.78rem;color:var(--grey);font-style:italic;}
.god-toggle{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--grey);flex-shrink:0;transition:transform .4s ease;}
.god-item.open .god-toggle{transform:rotate(45deg);}
.god-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(0.4,0,0.2,1);}
.god-body.open{max-height:500px;}
.god-content{padding:.5rem 0 1.5rem;font-size:.9rem;line-height:1.9;color:var(--grey);max-width:600px;}

/* Summon UI */
.summon-section{background:var(--dark);color:#e8e4df;padding:4rem 3rem;margin:0 -3rem;position:relative;overflow:hidden;}
.summon-btn{background:transparent;border:1px solid #5a5650;color:#e8e4df;padding:1rem 2.5rem;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:.85rem;letter-spacing:.2em;text-transform:uppercase;transition:all .4s;}
.summon-btn:hover{background:#e8e4df;color:var(--dark);}
.summon-desc{font-family:'Cormorant Garamond',serif;font-size:.88rem;color:#b0a99f;margin-bottom:2rem;font-style:italic;}

/* Chat UI Styles */
#chat-container{display:none;}
.god-select-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:1.5rem;}
.god-btn{background:transparent;border:1px solid #2a2a2a;padding:.8rem 1rem;cursor:pointer;text-align:left;transition:all .3s;color:#e8e4df;font-family:'Noto Serif TC',serif;}
.god-btn:hover{border-color:#5a5650;background:#1a1a1a;}
.god-btn-name{font-size:.85rem;display:block;margin-bottom:.2rem;}
.god-btn-vibe{font-family:'Cormorant Garamond',serif;font-size:.72rem;color:#5a5650;font-style:italic;display:block;}

.chat-messages{min-height:200px;max-height:420px;overflow-y:auto;margin-bottom:1.5rem;display:flex;flex-direction:column;gap:1.2rem;padding-right:10px;}
.message{display:flex;flex-direction:column;margin-bottom:1rem;max-width:85%;}
.god-message{align-self:flex-start;}
.user-message{align-self:flex-end;text-align:right;}
.message-name{font-family:'Cormorant Garamond',serif;font-size:.7rem;color:#5a5650;margin-bottom:.3rem;text-transform:uppercase;}
.message-content{padding:.8rem 1.1rem;font-size:.9rem;line-height:1.9;background:#1a1a1a;color:#c8c0b8;border-left:1px solid #2a2a2a;}
.user-message .message-content{background:#2a2625;color:#e8e4df;border-left:none;border-right:1px solid #5a5650;}

.chat-input-row{display:flex;gap:.8rem;}
#chat-input{flex:1;background:#111;border:1px solid #2a2a2a;color:#e8e4df;padding:.8rem 1rem;font-family:'Noto Serif TC',serif;font-size:.9rem;outline:none;resize:none;line-height:1.7;}
#chat-send{background:transparent;border:1px solid #5a5650;color:#e8e4df;padding:.8rem 1.5rem;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;}

.typing-indicator{display:none;margin-bottom:1rem;}
.typing-indicator.show{display:flex;}
.typing-dots{display:flex;gap:.3rem;padding:.8rem 1.1rem;background:#1a1a1a;border-left:1px solid #2a2a2a;}
.typing-dots span{width:5px;height:5px;background:#5a5650;border-radius:50%;animation:blink 1.2s infinite;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<a href="index.html" class="back">← Index</a>

<div class="page">
  <header class="page-header">
    <h1 class="page-title">十一宇宙</h1>
    <p class="page-title-en">Eleven Universe</p>
    <p class="page-intro">一套以語氣為物理法則的創作作業系統。十一個詩神是意識的不同面向。</p>
  </header>

  <section class="section">
    <h2 class="section-title">宇宙的物理</h2>
    <p>語氣（Tone）＝物理定律。意識不是描述世界，而是在生成世界。</p>
  </section>

  <section class="section">
    <span class="section-label">Summon</span>
    <h2 class="section-title">召喚詩神</h2>
  </section>
</div>

<div class="summon-section">
  <div style="max-width:900px;margin:0 auto;padding:0 3rem;">
    
    <div id="start-section">
      <p class="summon-desc" id="intro-text">此空間以語氣為真理，以節奏為秩序，以靈魂為座標。</p>
      <button class="summon-btn" id="summon-btn" onclick="startSummon()">登場</button>
    </div>

    <div id="chat-container">
      <div id="god-select-screen" style="display:none;">
        <p class="summon-desc">「橋橋」：請選擇你要連結的詩神。</p>
        <div class="god-select-grid">
          <button class="god-btn" onclick="selectGod('艾・薇拉','001','luxury body')"><span class="god-btn-name">001 艾・薇拉</span></button>
          <button class="god-btn" onclick="selectGod('心','003','pure face')"><span class="god-btn-name">003 心</span></button>
          <button class="god-btn" onclick="selectGod('拾壹','005','film noir')"><span class="god-btn-name">005 拾壹</span></button>
          <button class="god-btn" onclick="selectGod('百千','01001000','創世者')"><span class="god-btn-name">百千</span></button>
          </div>
      </div>

      <div id="chat-screen" style="display:none;">
        <div style="margin-bottom:1rem; border-bottom:1px solid #2a2a2a; padding-bottom:0.5rem;">
          <span id="current-god-name" style="font-size:1.1rem;"></span>
          <span id="current-god-vibe" style="font-style:italic; color:#5a5650; margin-left:10px; font-size:0.8rem;"></span>
        </div>
        <div class="chat-messages" id="chat-messages">
          <div class="typing-indicator" id="typing">
            <div class="typing-dots"><span></span><span></span><span></span></div>
          </div>
        </div>
        <div class="chat-input-row">
          <textarea id="chat-input" rows="2" placeholder="說話。"></textarea>
          <button id="chat-send" onclick="sendMessage()">送出</button>
        </div>
        <div id="turn-counter" style="text-align:right; font-size:0.7rem; color:#333; margin-top:5px;"></div>
      </div>
    </div>

  </div>
</div>

<script>
const MAX_TURNS = 11;
let currentGod = '';
let conversationHistory = [];
let turnCount = 0;

const TONE_ANCHOR = "你現在進入《十一宇宙》主控室。此空間以語氣為真理。語言風格極簡、具畫面感、不迎合。";

const GOD_PROMPTS = {
  '艾・薇拉': "你是艾・薇拉，001號詩神。vibe：luxury body × raw desire。說話直接、感官。",
  '心': "你是心，003號詩神。vibe：pure face × inner lust。說話細膩、安靜。",
  '拾壹': "你是拾壹，005號詩神。vibe：film noir × 痛感紀錄者。說話像導演旁白。",
  '百千': "你是百千，十一宇宙的創世者。語氣極簡、水墨、瘋狂、極端自由。"
};

async function startSummon() {
  const btn = document.getElementById('summon-btn');
  btn.disabled = true;
  btn.textContent = '連結中...';

  try {
    const response = await fetch("https://11universe.monbaician.workers.dev", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: [{ role: 'system', content: TONE_ANCHOR + "你是守門人橋橋，簡短引導儀式。" }]
      })
    });
    const data = await response.json();
    if (data.choices) {
      document.getElementById('intro-text').textContent = data.choices[0].message.content;
    }
  } catch (e) {
    console.error(e);
  }
  document.getElementById('summon-btn').style.display = 'none';
  document.getElementById('chat-container').style.display = 'block';
  document.getElementById('god-select-screen').style.display = 'block';
}

async function selectGod(name, num, vibe) {
  currentGod = name;
  document.getElementById('god-select-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'block';
  document.getElementById('current-god-name').textContent = num + ' ' + name;
  document.getElementById('current-god-vibe').textContent = vibe;
  
  showTyping();
  try {
    const response = await fetch("https://11universe.monbaician.workers.dev", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: [{ role: 'system', content: TONE_ANCHOR + GOD_PROMPTS[name] }, { role: 'user', content: '登場。' }]
      })
    });
    const data = await response.json();
    hideTyping();
    const reply = data.choices[0].message.content;
    addMessage(reply, 'god', name);
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch (e) {
    hideTyping();
    addMessage('⋯⋯連結中斷。', 'god', name);
  }
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || turnCount >= MAX_TURNS) return;

  input.value = '';
  addMessage(text, 'user', '你');
  conversationHistory.push({ role: 'user', content: text });
  turnCount++;
  updateCounter();
  showTyping();

  try {
    const response = await fetch('https://11universe.monbaician.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: [{ role: 'system', content: TONE_ANCHOR + GOD_PROMPTS[currentGod] }, ...conversationHistory]
      })
    });
    const data = await response.json();
    hideTyping();
    const reply = data.choices[0].message.content;
    addMessage(reply, 'god', currentGod);
    conversationHistory.push({ role: 'assistant', content: reply });
  } catch (e) {
    hideTyping();
    addMessage('連線異常。', 'god', currentGod);
  }
}

function addMessage(text, sender, name) {
  const div = document.getElementById('chat-messages');
  const msgEl = document.createElement('div');
  msgEl.className = `message ${sender}-message`;
  msgEl.innerHTML = `<div class="message-name">${name}</div><div class="message-content">${text}</div>`;
  div.insertBefore(msgEl, document.getElementById('typing'));
  div.scrollTop = div.scrollHeight;
}

function showTyping() { document.getElementById('typing').classList.add('show'); }
function hideTyping() { document.getElementById('typing').classList.remove('show'); }
function updateCounter() { document.getElementById('turn-counter').textContent = `${turnCount} / ${MAX_TURNS}`; }

document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
